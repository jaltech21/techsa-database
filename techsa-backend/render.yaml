services:
  - type: web
    name: techsa-backend
    runtime: ruby
    buildCommand: bundle install
    preDeployCommand: bundle exec rails db:migrate && (bundle exec rails db:seed || true)
    startCommand:     startCommand: bundle exec rails db:migrate && (bundle exec rails db:seed || true) && bundle exec puma -C config/puma.rb
    envVars:
      - key: RAILS_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: techsa-db
          property: connectionString
      - key: DEVISE_JWT_SECRET_KEY
        generateValue: false   # MUST be stable — generate once with `rails secret` and paste manually
        sync: false            # Never let Render auto-generate this; rotating it logs everyone out
      - key: RAILS_MASTER_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_SEED_PASSWORD
        sync: false

databases:
  - name: techsa-db
    databaseName: techsa_production
    user: techsa
